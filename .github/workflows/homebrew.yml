name: Homebrew

# Publish a Homebrew formula to the tap repo on every release, so
# `brew install yukimemi/tap/shoka` tracks the latest version with no
# manual formula bumping.
#
# This file is consumer-owned (NOT kata-managed), so edits here survive
# `kata apply`. It deliberately lives apart from the kata-managed
# `release.yml`: that workflow builds + uploads the binaries; this one
# reacts to its completion, checksums the macOS (Apple Silicon) + Linux
# (x86_64 musl) tarballs, renders `Formula/shoka.rb`, and pushes it to
# the tap.
#
# Trigger: `workflow_run` after the "Release" workflow finishes — NOT
# `release: published`. release.yml creates the GitHub Release with the
# default `GITHUB_TOKEN`, and GitHub deliberately does NOT let a
# `GITHUB_TOKEN`-authored event (the published release) trigger another
# workflow — the same recursion guard that makes `auto-tag.yml` push its
# tag with a PAT. A `release`-triggered job would therefore never fire.
# `workflow_run` chains off the upstream run regardless of token, and by
# the time "Release" reports success its assets are already uploaded, so
# the checksums below resolve.
#
# The tap repo `yukimemi/homebrew-tap` already exists (shun publishes a
# Cask there); this job just adds `Formula/shoka.rb` alongside it — a
# CLI formula coexists with shun's GUI cask in the same tap. The secret
# name `HOMEBREW_TAP_PAT` is shared with shun's release workflow on
# purpose, so the same PAT covers both.
#
# Prerequisite (one-time): a `HOMEBREW_TAP_PAT` secret on THIS repo — a
# PAT (or fine-grained token) with `contents: write` on the tap. If it's
# already an org/user-level secret it's inherited; otherwise set it with
# `gh secret set HOMEBREW_TAP_PAT`. Without it the job logs a warning and
# no-ops, so a release is never blocked on setup.

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  # Manual re-publish for an existing tag (e.g. after fixing the tap, or
  # backfilling the formula for a release cut before this workflow
  # existed).
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.21.0)"
        required: true

permissions:
  contents: read

env:
  # Override here if the tap ever moves; the workflow is otherwise
  # repo-agnostic.
  TAP_REPO: yukimemi/homebrew-tap
  FORMULA: shoka

jobs:
  formula:
    name: publish formula to tap
    runs-on: ubuntu-latest
    # On the `workflow_run` path, only act on a *successful* Release run
    # for a version tag (`head_branch` is the tag, e.g. `v0.21.0`). A
    # manual `workflow_dispatch` always proceeds.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    steps:
      - name: Check tap token
        id: check
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          if [ -z "${TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_PAT is not set — skipping tap update. Add a PAT with contents:write on ${TAP_REPO} to enable it."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve release tag
        id: tag
        if: steps.check.outputs.skip != 'true'
        # Pass the (potentially attacker-influenced) tag / branch names in
        # via env rather than expanding `${{ ... }}` straight into the
        # shell source — a tag or branch containing shell metacharacters
        # would otherwise be a template-injection vector.
        env:
          INPUT_TAG: ${{ inputs.tag }}
          RUN_TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${INPUT_TAG}"
          else
            # workflow_run: the upstream Release run's head_branch is the
            # tag it was pushed for (e.g. v0.21.0).
            tag="${RUN_TAG}"
          fi
          # Validate the shape before it flows into outputs / later
          # commands: rejects injection payloads, and turns a null /
          # unexpected head_branch into a loud failure instead of a bad
          # download URL.
          case "${tag}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "::error::Unexpected release tag '${tag}' — expected vX.Y.Z"
              exit 1
              ;;
          esac
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Render formula
        id: render
        if: steps.check.outputs.skip != 'true'
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          base="https://github.com/${REPO}/releases/download/${TAG}"
          macos_arm="${FORMULA}-aarch64-apple-darwin.tar.gz"
          linux_x86="${FORMULA}-x86_64-unknown-linux-musl.tar.gz"

          # Pull the release tarballs and checksum them. --retry-all-errors
          # is essential alongside --retry: plain --retry only covers
          # network-level failures, but a just-published asset still
          # settling on GitHub's CDN returns HTTP 404, which --retry alone
          # would abort on immediately.
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors "${base}/${macos_arm}" -o "${macos_arm}"
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors "${base}/${linux_x86}" -o "${linux_x86}"
          macos_sha="$(sha256sum "${macos_arm}" | cut -d' ' -f1)"
          linux_sha="$(sha256sum "${linux_x86}" | cut -d' ' -f1)"

          # A capitalised class name is required; `shoka` → `Shoka`.
          class="$(printf '%s' "${FORMULA}" | sed -E 's/(^|[-_ ])([a-z])/\U\2/g')"

          mkdir -p out
          cat > "out/${FORMULA}.rb" <<RUBY
          # typed: false
          # frozen_string_literal: true

          # Homebrew formula for shoka — your repository bookshelf.
          # Auto-generated by yukimemi/shoka .github/workflows/homebrew.yml.
          # Do not edit by hand; changes are overwritten on the next release.
          class ${class} < Formula
            desc "Repository workspace manager: jj-aware successor to ghq / rhq with a TUI dashboard"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${base}/${macos_arm}"
                sha256 "${macos_sha}"
              end
            end

            on_linux do
              on_intel do
                url "${base}/${linux_x86}"
                sha256 "${linux_sha}"
              end
            end

            def install
              bin.install "${FORMULA}"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/${FORMULA} --version")
            end
          end
          RUBY

          echo "Rendered formula:"
          cat "out/${FORMULA}.rb"

      - name: Checkout tap
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v7
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          path: tap

      - name: Commit and push formula
        if: steps.check.outputs.skip != 'true'
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          cp "out/${FORMULA}.rb" "tap/Formula/${FORMULA}.rb"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Formula/${FORMULA}.rb"
          if git diff --cached --quiet; then
            echo "Formula already up to date for ${TAG} — nothing to push."
            exit 0
          fi
          git commit -m "${FORMULA} ${TAG}"
          git push
